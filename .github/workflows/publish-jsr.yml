name: Publish to JSR

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun run test

      - name: Dry run JSR publish
        run: npx jsr publish --dry-run

      - name: Publish to JSR
        if: startsWith(github.ref, 'refs/tags/')
        run: npx jsr publish
