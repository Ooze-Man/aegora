name: Aegora Internal Rename Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - scripts/rename-internals.mjs
      - src/**
      - test/**
      - example/**
      - docs/migration/**

permissions:
  contents: read

jobs:
  rename-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run Aegora internal rename codemod
        run: bun scripts/rename-internals.mjs

      - name: Show diff summary
        run: git diff --stat

      - name: Fail if codemod still changes files
        run: git diff --exit-code
